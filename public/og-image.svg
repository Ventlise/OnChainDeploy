<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14"/>
      <stop offset="0.5" stop-color="#12101f"/>
      <stop offset="1" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5af5"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5af5" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5af5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="120" r="350" fill="url(#orb1)"/>
  <circle cx="1050" cy="550" r="380" fill="url(#orb2)"/>

  <!-- Grid lines -->
  <g stroke="#7c5af5" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brand)"/>

  <!-- Logo cube -->
  <g transform="translate(90, 90)">
    <rect width="84" height="84" rx="20" fill="url(#brand)"/>
    <g transform="translate(42, 42)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -22L-19 -11v22L0 22l19 -11v-22z"/>
      <path d="M-19 -11L0 0l19 -11M0 0v22" opacity="0.7"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="195" y="125" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#f0f0fa">OnChainDeploy</text>
  <text x="195" y="160" font-family="Arial, sans-serif" font-size="20" fill="#a8aac0">One-click contracts on Base</text>

  <!-- Main headline -->
  <text x="90" y="330" font-family="Arial, sans-serif" font-size="76" font-weight="800" fill="#f0f0fa">Ship a contract in</text>
  <text x="90" y="420" font-family="Arial, sans-serif" font-size="76" font-weight="800" fill="url(#brand)">one click.</text>

  <!-- Subtitle -->
  <text x="92" y="478" font-family="Arial, sans-serif" font-size="26" fill="#a8aac0">No code. No Remix. Verified on BaseScan in seconds.</text>

  <!-- Feature pills -->
  <g font-family="Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="90" y="525" width="200" height="48" rx="24" fill="#7c5af5" fill-opacity="0.12" stroke="#7c5af5" stroke-opacity="0.3"/>
    <text x="120" y="555" fill="#c4b5fd">✓ Deploy Free</text>

    <rect x="305" y="525" width="240" height="48" rx="24" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.3"/>
    <text x="335" y="555" fill="#7dd3fc">✓ BaseScan Verified</text>

    <rect x="560" y="525" width="220" height="48" rx="24" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.3"/>
    <text x="590" y="555" fill="#6ee7b7">✓ Non-Custodial</text>
  </g>

  <!-- Base badge bottom right -->
  <g transform="translate(960, 540)">
    <rect width="150" height="44" rx="22" fill="#38bdf8" fill-opacity="0.10" stroke="#38bdf8" stroke-opacity="0.3"/>
    <circle cx="28" cy="22" r="6" fill="#38bdf8"/>
    <text x="44" y="29" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#7dd3fc">Built on Base</text>
  </g>
</svg>